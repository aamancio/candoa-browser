name: Candoa CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: candoa-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Static Quality Gate
    runs-on: macos-latest

    steps:
      - name: Check out Candoa
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi

      - name: Run quality checks
        run: Scripts/quality-check.sh

  build:
    name: Debug Build
    runs-on: macos-latest

    steps:
      - name: Check out Candoa
        uses: actions/checkout@v4

      - name: Show toolchain
        run: xcodebuild -version

      - name: Build app
        run: |
          xcodebuild \
            -project Candoa.xcodeproj \
            -scheme Candoa \
            -configuration Debug \
            -destination platform=macOS \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=- \
            DEVELOPMENT_TEAM= \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            build

  e2e:
    name: Native macOS E2E
    runs-on: macos-latest
    needs:
      - quality
      - build

    steps:
      - name: Check out Candoa
        uses: actions/checkout@v4

      - name: Show toolchain
        run: xcodebuild -version

      - name: Run XCTest UI suite
        env:
          CANDOA_E2E_ADHOC_SIGNING: "1"
          CANDOA_DERIVED_DATA_PATH: build/DerivedData
        run: Scripts/e2e-test.sh

      - name: Upload XCTest result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: candoa-e2e-xcresult
          path: build/DerivedData/Logs/Test/*.xcresult
          if-no-files-found: ignore
