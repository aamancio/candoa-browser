name: Update CandoaSite Download

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: update-candoa-site-download
  cancel-in-progress: true

jobs:
  build-and-update-site:
    name: Build DMG and update CandoaSite
    runs-on: macos-latest
    env:
      SITE_REPOSITORY: ${{ vars.CANDOA_SITE_REPOSITORY || 'aamancio/candoa-site' }}
      SITE_BRANCH: ${{ vars.CANDOA_SITE_BRANCH || 'main' }}
      APP_DMG: ${{ github.workspace }}/artifacts/Candoa.dmg
      APP_BUNDLE: ${{ github.workspace }}/build/DerivedData/Build/Products/Release/Candoa.app
      SPARKLE_VERSION: 2.9.3
      CODE_SIGN_IDENTITY: Developer ID Application

    steps:
      - name: Check out Candoa
        uses: actions/checkout@v4

      - name: Prepare signing keychain path
        run: echo "SIGNING_KEYCHAIN_PATH=$RUNNER_TEMP/candoa-signing.keychain-db" >> "$GITHUB_ENV"

      - name: Validate release signing secrets
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          missing=0
          for name in \
            APPLE_TEAM_ID \
            DEVELOPER_ID_CERTIFICATE_BASE64 \
            DEVELOPER_ID_CERTIFICATE_PASSWORD \
            APPLE_NOTARY_KEY_BASE64 \
            APPLE_NOTARY_KEY_ID \
            APPLE_NOTARY_ISSUER_ID
          do
            if [ -z "${!name}" ]; then
              echo "$name secret is required for Developer ID signing and notarization." >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-certificate.p12"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          printf '%s' "$DEVELOPER_ID_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$SIGNING_KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$SIGNING_KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$SIGNING_KEYCHAIN_PATH"
          security list-keychains -d user -s "$SIGNING_KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$SIGNING_KEYCHAIN_PATH"

      - name: Build Release app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -project Candoa.xcodeproj \
            -scheme Candoa \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            build

      - name: Re-sign Sparkle helpers
        run: |
          SPARKLE_FRAMEWORK="$APP_BUNDLE/Contents/Frameworks/Sparkle.framework"
          SPARKLE_VERSION="$SPARKLE_FRAMEWORK/Versions/B"
          APP_ENTITLEMENTS="build/DerivedData/Build/Intermediates.noindex/Candoa.build/Release/Candoa.build/Candoa.app.xcent"

          codesign --force --sign "$CODE_SIGN_IDENTITY" --timestamp --options runtime \
            "$SPARKLE_VERSION/Autoupdate"
          codesign --force --sign "$CODE_SIGN_IDENTITY" --timestamp --options runtime \
            "$SPARKLE_VERSION/XPCServices/Downloader.xpc"
          codesign --force --sign "$CODE_SIGN_IDENTITY" --timestamp --options runtime \
            "$SPARKLE_VERSION/XPCServices/Installer.xpc"
          codesign --force --sign "$CODE_SIGN_IDENTITY" --timestamp --options runtime \
            "$SPARKLE_VERSION/Updater.app"
          codesign --force --sign "$CODE_SIGN_IDENTITY" --timestamp --options runtime \
            "$SPARKLE_FRAMEWORK"
          codesign --force --sign "$CODE_SIGN_IDENTITY" --timestamp --options runtime \
            --entitlements "$APP_ENTITLEMENTS" \
            "$APP_BUNDLE"

      - name: Verify app signature
        run: |
          codesign --verify --deep --strict --verbose=2 "$APP_BUNDLE"
          codesign --display --verbose=4 "$APP_BUNDLE"

      - name: Package DMG
        run: |
          mkdir -p artifacts
          chmod +x Scripts/package_dmg.sh
          Scripts/package_dmg.sh \
            "$APP_BUNDLE" \
            "$APP_DMG"
          shasum -a 256 "$APP_DMG"

      - name: Sign, notarize, and staple DMG
        env:
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_$APPLE_NOTARY_KEY_ID.p8"
          printf '%s' "$APPLE_NOTARY_KEY_BASE64" | base64 --decode > "$NOTARY_KEY_PATH"

          codesign --sign "$CODE_SIGN_IDENTITY" --timestamp "$APP_DMG"
          codesign --verify --verbose=2 "$APP_DMG"

          xcrun notarytool submit "$APP_DMG" \
            --key "$NOTARY_KEY_PATH" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --wait
          xcrun stapler staple "$APP_DMG"
          xcrun stapler validate "$APP_DMG"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$APP_DMG"

      - name: Read app version
        run: |
          APP_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP_BUNDLE/Contents/Info.plist")"
          APP_BUILD="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP_BUNDLE/Contents/Info.plist")"
          APP_BUNDLE_IDENTIFIER="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_BUNDLE/Contents/Info.plist")"
          {
            echo "APP_VERSION=$APP_VERSION"
            echo "APP_BUILD=$APP_BUILD"
            echo "APP_BUNDLE_IDENTIFIER=$APP_BUNDLE_IDENTIFIER"
            echo "APP_FILE_NAME=Candoa $APP_VERSION.dmg"
            echo "APP_ARCHIVE_NAME=Candoa-$APP_VERSION.dmg"
          } >> "$GITHUB_ENV"

      - name: Install Sparkle tools
        run: |
          SPARKLE_TOOLS="$RUNNER_TEMP/sparkle-tools"
          echo "SPARKLE_TOOLS=$SPARKLE_TOOLS" >> "$GITHUB_ENV"
          curl -L --fail \
            "https://github.com/sparkle-project/Sparkle/releases/download/$SPARKLE_VERSION/Sparkle-$SPARKLE_VERSION.tar.xz" \
            -o "$RUNNER_TEMP/Sparkle.tar.xz"
          mkdir -p "$SPARKLE_TOOLS"
          tar -xf "$RUNNER_TEMP/Sparkle.tar.xz" -C "$SPARKLE_TOOLS" --strip-components=1
          "$SPARKLE_TOOLS/bin/generate_appcast" --help >/dev/null

      - name: Check out CandoaSite
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SITE_REPOSITORY }}
          ref: ${{ env.SITE_BRANCH }}
          ssh-key: ${{ secrets.CANDOA_SITE_DEPLOY_KEY }}
          path: CandoaSite

      - name: Update site download
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "SPARKLE_PRIVATE_KEY secret is required to sign Sparkle updates." >&2
            exit 1
          fi

          mkdir -p CandoaSite/public/downloads
          cp "$APP_DMG" CandoaSite/public/downloads/Candoa.dmg
          find CandoaSite/public/downloads -maxdepth 1 -type f \( -name 'Candoa *.dmg' -o -name 'Candoa-*.dmg' \) -delete
          cp "$APP_DMG" "CandoaSite/public/downloads/$APP_ARCHIVE_NAME"

          APPCAST_DIR="$(mktemp -d)"
          cp "$APP_DMG" "$APPCAST_DIR/$APP_ARCHIVE_NAME"
          cat > "$APPCAST_DIR/Candoa-$APP_VERSION.md" <<EOF
          # Candoa $APP_VERSION

          This update was generated automatically from Candoa commit ${GITHUB_SHA::7}.
          EOF
          printf '%s' "$SPARKLE_PRIVATE_KEY" | "$SPARKLE_TOOLS/bin/generate_appcast" \
            --ed-key-file - \
            --download-url-prefix "https://candoa.app/downloads/" \
            --link "https://candoa.app" \
            --maximum-versions 1 \
            --embed-release-notes \
            -o "$APPCAST_DIR/appcast.xml" \
            "$APPCAST_DIR"
          cp "$APPCAST_DIR/appcast.xml" CandoaSite/public/downloads/appcast.xml

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = {
              "version": os.environ["APP_VERSION"],
              "build": os.environ["APP_BUILD"],
              "bundleIdentifier": os.environ["APP_BUNDLE_IDENTIFIER"],
              "fileName": os.environ["APP_FILE_NAME"],
              "downloadURL": f"https://candoa.app/downloads/{os.environ['APP_ARCHIVE_NAME']}",
              "stableDownloadURL": "https://candoa.app/downloads/Candoa.dmg",
              "archiveURL": f"https://candoa.app/downloads/{os.environ['APP_ARCHIVE_NAME']}",
              "appcastURL": "https://candoa.app/downloads/appcast.xml",
              "releaseNotesURL": "https://github.com/aamancio/candoa-browser/releases",
          }

          Path("CandoaSite/public/downloads/latest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          rm -f CandoaSite/public/downloads/Candoa.zip

      - name: Commit site download
        working-directory: CandoaSite
        run: |
          if [ -z "$(git status --porcelain -- public/downloads)" ]; then
            echo "Candoa download is unchanged; nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/downloads
          git commit -m "Update Candoa $APP_VERSION download from ${GITHUB_SHA::7}"
          git push origin "HEAD:$SITE_BRANCH"
