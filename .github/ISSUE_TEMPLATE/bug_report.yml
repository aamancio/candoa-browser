name: Bug report
description: Report user-visible broken behavior
title: "Bug: "
labels:
  - type: bug
  - status: needs triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a Candoa bug. Please include enough detail for someone else to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
      placeholder: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps are best.
      placeholder: |
        1. Open Candoa
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Candoa version
      placeholder: 0.1.1, commit SHA, or build number
    validations:
      required: false
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: macOS 15.x, macOS 26.x, etc.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, logs, sample URLs, or notes about whether this affects battery, hibernation, media playback, or WebKit lifecycle.
    validations:
      required: false
